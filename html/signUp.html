<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | SKALA-FRONT</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="topnav">
    <span class="brand"><span class="cn">박기택의</span> 스칼라 행보</span>
    <ul>
      <li><a href="index.html">홈</a></li>
      <li><a href="myClass.html">수업</a></li>
      <li><a href="myTrip.html">여행지</a></li>
      <li><a href="myHoliday.html">휴일</a></li>
      <li><a href="myProfile.html">프로필</a></li>
      <li><a href="signUp.html" class="active">회원가입</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>👤 회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">

      <fieldset>
        <legend>계정 정보</legend>

        <div class="field">
          <label for="userId">아이디 <span class="req">*</span></label>
          <input type="text" id="userId" name="userId"
                 placeholder="4~15자 영문/숫자"
                 minlength="4" maxlength="15" required>
          <span class="hint">(필수)</span>
        </div>

        <div class="field">
          <label for="userPw">비밀번호 <span class="req">*</span></label>
          <input type="password" id="userPw" name="userPw"
                 placeholder="8자 이상 입력"
                 minlength="8" required>
          <span class="hint">(필수)</span>
        </div>

        <div class="field">
          <label for="email">이메일 <span class="req">*</span></label>
          <div class="inline-row">
            <input type="text" id="email" name="email" placeholder="example" required>
            <span>@</span>
            <select name="emailDomain" id="emailDomain">
              <option value="">직접 입력</option>
              <option value="naver.com">naver.com</option>
              <option value="gmail.com">gmail.com</option>
              <option value="daum.net">daum.net</option>
              <option value="kakao.com">kakao.com</option>
            </select>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>개인 프로필 정보</legend>

        <div class="field">
          <label for="userName">이름</label>
          <input type="text" id="userName" name="userName" required>
        </div>

        <div class="field">
          <label for="birthDate">생년월일</label>
          <input type="date" id="birthDate" name="birthDate">
        </div>

        <div class="field">
          <label>성별</label>
          <div class="choice-group">
            <label class="choice"><input type="radio" name="gender" value="male" checked> 남성</label>
            <label class="choice"><input type="radio" name="gender" value="female"> 여성</label>
            <label class="choice"><input type="radio" name="gender" value="none"> 선택안함</label>
          </div>
        </div>

        <div class="field">
          <label>관심 분야 <span class="hint">(중복 선택 가능)</span></label>
          <div class="choice-group">
            <label class="choice"><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label>
            <label class="choice"><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label>
            <label class="choice"><input type="checkbox" name="interest" value="backend"> 백엔드 &amp; 데이터베이스</label>
            <label class="choice"><input type="checkbox" name="interest" value="cloud"> 클라우드 &amp; 인프라</label>
          </div>
        </div>

        <div class="field">
          <label for="route">가입 경로</label>
          <select id="route" name="route" required>
            <option value="">-- 선택해 주세요 --</option>
            <option value="search">검색 엔진</option>
            <option value="sns">SNS 광고</option>
            <option value="friend">지인 추천</option>
            <option value="etc">기타</option>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>자기소개</legend>

        <div class="field">
          <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label>
          <textarea id="intro" name="intro" rows="4" cols="50" maxlength="200"
                    placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
        </div>
      </fieldset>

      <div class="form-actions">
        <button type="submit">동의하고 회원가입</button>
        <button type="reset">다시 작성</button>
      </div>

    </form>

    <p style="margin-top:1.4rem"><a href="index.html">← 메인으로 돌아가기</a></p>
    <footer>© 2026 박기택. 웹 표준 시맨틱 태그로 작성되었습니다.</footer>
  </div>

</body>
</html>
