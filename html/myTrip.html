<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 여행지</title>
  </head>
  <body>
    <h2>🌏 나의 여행 앨범 🎵</h2>

    <audio controls>
      <source src="../media/music.mp3" type="audio/mpeg" />
      브라우저가 audio 태그를 지원하지 않습니다.
    </audio>

    <figure>
      <img src="../media/리장.jpg" alt="리장 호도협" width="400" />
      <figcaption>리장 호도협 (2025년)</figcaption>
    </figure>

    <figure>
      <img src="../media/세부.jpg" alt="세부 탑스힐" width="400" />
      <figcaption>세부 탑스힐 (2024년)</figcaption>
    </figure>

    <figure>
      <img src="../media/홋카이도.jpg" alt="홋카이도 다이세츠산" width="400" />
      <figcaption>홋카이도 다이설산 (2025년)</figcaption>
    </figure>

    <h2>🎬 나의 여행 브이로그</h2>

    <figure>
      <video controls width="400">
        <source src="../media/video.mp4" type="video/mp4" />
        브라우저가 video 태그를 지원하지 않습니다.
      </video>
      <figcaption>리장의 아름다운 음악 🎶</figcaption>
    </figure>
  </body>
</html>
